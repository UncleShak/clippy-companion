<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--vscode-font-family);
  background: var(--vscode-sideBar-background);
  color: var(--vscode-foreground);
  padding: 10px;
  overflow: hidden;
}

#setup {
  display: none;
  flex-direction: column;
  gap: 8px;
}
#setup h3 { font-size: 13px; }
#setup p { font-size: 11px; opacity: 0.6; line-height: 1.5; }
input[type=password] {
  width: 100%; padding: 6px; font-size: 12px;
  border-radius: 4px;
  border: 1px solid var(--vscode-input-border);
  background: var(--vscode-input-background);
  color: var(--vscode-input-foreground);
}
#saveBtn, #clearBtn {
  padding: 6px; font-size: 12px;
  border-radius: 4px; border: none;
  cursor: pointer; width: 100%;
}
#saveBtn {
  background: var(--vscode-button-background);
  color: var(--vscode-button-foreground);
}
#clearBtn {
  background: transparent;
  border: 1px solid var(--vscode-button-background);
  color: var(--vscode-foreground);
}

/* Main layout - fixed height sections */
#main {
  display: none;
  flex-direction: column;
  gap: 8px;
}

#bubble {
  display: none;
  width: 100%;
  background: #ffffcc;
  border: 1px solid #c8b400;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.6;
  color: #333;
  cursor: pointer;
  position: relative;
}
#bubble:hover { border-color: #999900; }
#bubble::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 9px solid #c8b400;
}
#bubble-hint {
  font-size: 10px;
  opacity: 0.5;
  margin-top: 6px;
  color: #555;
}

/* This is the key - a fixed height box where Clippy floats */
#clippy-stage {
  width: 100%;
  height: 130px;
  position: relative;
  overflow: hidden;
}

#status {
  font-size: 11px;
  opacity: 0.55;
  text-align: center;
}

#bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  font-size: 11px;
}
#mode-row { display: flex; align-items: center; gap: 6px; }
#mode-label { opacity: 0.6; }
#setup-link {
  opacity: 0.4;
  cursor: pointer;
  text-decoration: underline;
}

#error-nav {
  display: none;
  gap: 6px;
  width: 100%;
}
#error-nav button {
  flex: 1; padding: 4px 6px; font-size: 11px;
  border-radius: 4px; border: none; cursor: pointer;
  background: var(--vscode-button-background);
  color: var(--vscode-button-foreground);
}

/* Override clippyjs positioning to stay in our stage */
.clippy-container {
  position: absolute !important;
  bottom: 0 !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
}
</style>
</head>
<body>

<div id="setup">
  <h3>Hey! I am Clippy!</h3>
  <p>I watch your code for errors.<br/>Add your Anthropic API key for Smart Mode:</p>
  <input id="apiKeyInput" type="password" placeholder="sk-ant-..." />
  <button id="saveBtn">Save Key - Smart Mode</button>
  <button id="clearBtn">Skip - Classic Mode (free)</button>
</div>

<div id="main">
  <div id="bubble">
    <span id="bubble-text"></span>
    <div id="bubble-hint">Click to jump to error</div>
  </div>
  <div id="clippy-stage"></div>
  <div id="status">No errors - just vibing</div>
  <div id="error-nav">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>
  <div id="bottom-row">
    <div id="mode-row">
      <input type="checkbox" id="modeToggle"/>
      <label for="modeToggle" id="mode-label">Classic Mode</label>
    </div>
    <span id="setup-link">Change API key</span>
  </div>
</div>

<script src="JQUERY_SRC"></script>
<script src="LIB_SRC"></script>
<script>
  var vscode = acquireVsCodeApi();
  var currentErrors = [];
  var currentIndex = 0;
  var smartMode = false;
  var clippyAgent = null;

  vscode.postMessage({ command: 'getKey' });

  clippy.BASE_PATH = 'AGENTS_SRC';
  clippy.load('Clippy', function(agent) {
      clippyAgent = agent;
      agent.show();
      agent.animate();
      // Move Clippy into our stage after he appears
      setTimeout(function() {
          var stage = document.getElementById('clippy-stage');
          var clippyEl = document.querySelector('div.clippy');
          var balloonEl = document.querySelector('div.clippy-balloon');
          if (clippyEl && stage) {
              stage.appendChild(clippyEl);
              clippyEl.style.position = 'absolute';
              clippyEl.style.bottom = '0';
              clippyEl.style.top = 'auto';
              clippyEl.style.left = '50%';
              clippyEl.style.transform = 'translateX(-50%)';
          }
          if (balloonEl) {
              balloonEl.style.display = 'none';
          }
      }, 600);
  });

  window.addEventListener('message', function(e) {
    var msg = e.data;
    if (msg.command === 'keyResult') {
      if (msg.hasKey) { showMain(true); } else { showSetup(); }
    }
    if (msg.command === 'keysaved') { showMain(true); }
    if (msg.command === 'errorsUpdated') { handleErrors(msg.errors); }
    if (msg.command === 'clippyReply') { showBubble(msg.text); }
  });

  function showSetup() {
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
  }

  function showMain(hasKey) {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    smartMode = hasKey;
    document.getElementById('modeToggle').checked = hasKey;
    document.getElementById('mode-label').textContent = hasKey ? 'Smart Mode' : 'Classic Mode';
  }

  document.getElementById('saveBtn').onclick = function() {
    var key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { return; }
    vscode.postMessage({ command: 'saveKey', key: key });
  };
  document.getElementById('clearBtn').onclick = function() { showMain(false); };
  document.getElementById('modeToggle').onchange = function(e) {
    smartMode = e.target.checked;
    document.getElementById('mode-label').textContent = smartMode ? 'Smart Mode' : 'Classic Mode';
  };
  document.getElementById('setup-link').onclick = function() { showSetup(); };
  document.getElementById('bubble').onclick = function() {
    if (currentErrors.length === 0) { return; }
    vscode.postMessage({ command: 'jumpToError', line: currentErrors[currentIndex].line });
  };
  document.getElementById('prevBtn').onclick = function() {
    currentIndex = (currentIndex - 1 + currentErrors.length) % currentErrors.length;
    displayError();
  };
  document.getElementById('nextBtn').onclick = function() {
    currentIndex = (currentIndex + 1) % currentErrors.length;
    displayError();
  };

  function handleErrors(errors) {
    currentErrors = errors;
    currentIndex = 0;
    if (errors.length === 0) {
      document.getElementById('bubble').style.display = 'none';
      document.getElementById('error-nav').style.display = 'none';
      document.getElementById('status').textContent = 'No errors - just vibing';
      if (clippyAgent) { clippyAgent.animate(); }
      return;
    }
    document.getElementById('error-nav').style.display = errors.length > 1 ? 'flex' : 'none';
    displayError();
  }

  function displayError() {
    var error = currentErrors[currentIndex];
    if (clippyAgent) { clippyAgent.play('Alert'); }
    var count = currentErrors.length;
    document.getElementById('status').textContent = count + ' error(s) - ' + (currentIndex + 1) + ' of ' + count;
    if (smartMode) {
      showBubble('Hmm, let me think...');
      vscode.postMessage({ command: 'askClippy', error: error.message });
    } else {
      var msgs = [
        'Something looks off on line ' + error.line + '!',
        'Spotted a problem on line ' + error.line + '!',
        'Line ' + error.line + ' needs attention!',
      ];
      showBubble(msgs[Math.floor(Math.random() * msgs.length)] + '\n\n' + error.message);
    }
  }

  function showBubble(text) {
    document.getElementById('bubble-text').textContent = text;
    document.getElementById('bubble').style.display = 'block';
  }
</script>
</body>
</html>
